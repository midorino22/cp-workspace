services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APPUSER: root
    working_dir: /workspace
    init: true
    tty: true
    stdin_open: true
    environment:
      APPUSER: root
    volumes:
      - ./:/workspace
      - cargo-registry:/root/.cargo/registry
      - rustup-home:/root/.rustup
    ports:
      - "127.0.0.1:${VIS_PORT_HOST:-8080}:${VIS_PORT_CONTAINER:-8080}"
    command: ["sleep", "infinity"]

volumes:
  cargo-registry:
  rustup-home:
